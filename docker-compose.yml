version: "3.9"

services:
  db:
    image: postgres:15
    container_name: dino-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wallet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: dino-api
    restart: always
    depends_on:
      - db
    ports:
      - "5001:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/wallet
    volumes:
      - .:/app
    env_file:
      - ./src/app/.env

volumes:
  postgres_data: